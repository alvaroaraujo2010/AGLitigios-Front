<div class="wrap">
  <div class="card">
    <img
      class="card__logo"
      src="assets/images/brand/logo.png"
      width="140"
      height="56"
      alt="AG Litigios"
    />
    <p class="eyebrow">Acceso despacho</p>
    <h1>Inicio de sesión</h1>
    <p class="lead">Solo personal autorizado (abogado o secretaria).</p>

    @if (errorMsg()) {
      <div class="banner" role="alert">{{ errorMsg() }}</div>
    }

    <form (ngSubmit)="submit()" class="form">
      <label class="field">
        <span>Usuario</span>
        <input type="text" name="username" [(ngModel)]="username" autocomplete="username" />
      </label>
      <label class="field">
        <span>Contraseña</span>
        <input type="password" name="password" [(ngModel)]="password" autocomplete="current-password" />
      </label>
      <button type="submit" class="btn btn--primary" [disabled]="loading()">
        {{ loading() ? 'Entrando…' : 'Entrar' }}
      </button>
    </form>

    <p class="foot"><a routerLink="/">Volver al sitio público</a></p>
  </div>
</div>
